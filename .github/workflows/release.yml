name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  BINARY_NAME: pw-env

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: pw-env
            archive: tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: pw-env
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: pw-env.exe
            archive: zip
          - runner: macos-14
            target: x86_64-apple-darwin
            binary: pw-env
            archive: tar.gz
          - runner: macos-14
            target: aarch64-apple-darwin
            binary: pw-env
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Verify tag matches crate version
        shell: bash
        run: |
          crate_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          tag_version="${RELEASE_TAG#v}"
          if [ "$crate_version" != "$tag_version" ]; then
            echo "::error::Crate version $crate_version does not match tag version $tag_version"
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../pw-env-${RELEASE_TAG}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "pw-env-${env:RELEASE_TAG}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pw-env-${{ matrix.target }}
          path: pw-env-${{ env.RELEASE_TAG }}-${{ matrix.target }}.*

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate release notes
        run: |
          git-cliff --config .github/cliff.toml --latest --strip header -o RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file RELEASE_NOTES.md \
            dist/*
