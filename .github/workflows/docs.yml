name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - docs/.vitepress/**
      - docs/**
      - package.json
      - package-lock.json
      - scripts/install.sh
      - scripts/generate-sitemap.mjs
      - scripts/sync-doc-assets.mjs
      - README.md
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install docs dependencies
        run: npm ci

      - name: Build site
        env:
          SITE_BASE: /pw-env/
          SITE_URL: https://m42e.de/pw-env/
        run: npm run docs:build

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy docs
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4